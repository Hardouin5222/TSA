services:
  postgres:
    image: postgres:16-alpine
    container_name: tsa-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-travel_super_app}
      POSTGRES_USER: ${POSTGRES_USER:-travel_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - ./.data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-travel_admin} -d ${POSTGRES_DB:-travel_super_app}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: tsa-redis
    ports:
      - "6379:6379"
    volumes:
      - ./.data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: tsa-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-travelmq}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-change_me}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - ./.data/rabbitmq:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: tsa-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-change_me_minio}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./.data/minio:/data

  api-gateway:
    build:
      context: .
      dockerfile: services/api-gateway/Dockerfile
    container_name: tsa-api-gateway
    env_file:
      - .env
    environment:
      SERVICE_NAME: api-gateway
      SERVICE_PORT: ${API_GATEWAY_PORT:-8000}
      APP_ENV: local
      USER_SERVICE_BASE_URL: http://user-service:${USER_SERVICE_PORT:-8001}
      DATABASE_URL: postgresql+psycopg://travel_admin:change_me@postgres:5432/travel_super_app
      REDIS_URL: redis://redis:6379/0
      RABBITMQ_URL: amqp://travelmq:change_me@rabbitmq:5672/
    ports:
      - "${API_GATEWAY_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  user-service:
    build:
      context: .
      dockerfile: services/user-service/Dockerfile
    container_name: tsa-user-service
    env_file:
      - .env
    environment:
      SERVICE_NAME: user-service
      SERVICE_PORT: ${USER_SERVICE_PORT:-8001}
      APP_ENV: local
      DATABASE_URL: postgresql+psycopg://travel_admin:change_me@postgres:5432/travel_super_app
      REDIS_URL: redis://redis:6379/1
      RABBITMQ_URL: amqp://travelmq:change_me@rabbitmq:5672/
    ports:
      - "${USER_SERVICE_PORT:-8001}:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
